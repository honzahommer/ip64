# PowerDNS Authoritative server -> ip64 remote backend (HTTP connector).
launch=remote
remote-connection-string=http:url=http://ip64_backend:8080/dns,post,post_json,timeout=2000

local-address=0.0.0.0,::
local-port=53

# The backend answers zones live via SOA lookups; we don't enumerate zones,
# so disable the zone cache to avoid getAllDomains calls.
zone-cache-refresh-interval=0

# Authoritative only; no recursion.
disable-axfr=yes
loglevel=4

# Keep API/webserver config (rendered into pdns.d when PDNS_AUTH_API_KEY is set).
include-dir=/etc/powerdns/pdns.d

# Hide DNS Server Version 
version-string=anonymous
