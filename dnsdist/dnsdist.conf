-- dnsdist: DNS-over-HTTPS front-end forwarding to the PowerDNS auth backend.

-- Backend: the PowerDNS authoritative container (plain DNS on :53).
-- dnsdist needs an IP here, so the pdns service is pinned to this address
-- in docker-compose.yml.
newServer({address = "172.35.53.10:53", name = "ip64_pdns"})

-- Public wildcard DNS service: accept queries from anywhere.
-- (dnsdist's default ACL only allows RFC1918/loopback.)
setACL({"0.0.0.0/0", "::/0"})

-- DNS-over-HTTPS endpoint at https://<host>/dns-query
addDOHLocal("0.0.0.0:443",
            "/etc/dnsdist/certs/cert.pem",
            "/etc/dnsdist/certs/key.pem",
            {"/dns-query"})

includeDirectory("/etc/dnsdist/conf.d")
